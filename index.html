<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>RH Movimentações — Entradas e Saídas</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Arial,sans-serif;background:#f8fafc;color:#111827}
    input,select,button{font-family:inherit}
    table{border-collapse:collapse;width:100%}
    th{padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #e5e7eb;background:#f9fafb}
    td{padding:10px 14px;font-size:13px;color:#374151;border-bottom:1px solid #f3f4f6}
    tr:hover td{background:#f9fafb}
    .badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
    .badge-green{background:#d1fae5;color:#065f46}
    .badge-red{background:#fee2e2;color:#991b1b}
    .badge-amber{background:#fef3c7;color:#92400e}
    .badge-blue{background:#dbeafe;color:#1e40af}
    .badge-gray{background:#f3f4f6;color:#374151}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px}
    .stat-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:18px 20px}
    .btn{padding:8px 16px;border:1px solid #d1d5db;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-weight:500}
    .btn:hover{background:#f9fafb}
    .btn-primary{background:#2563eb;color:#fff;border-color:#2563eb}
    .btn-primary:hover{background:#1d4ed8}
    input[type=text],input[type=search],select{padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;outline:none}
    input:focus,select:focus{border-color:#2563eb}
    #toast{position:fixed;top:20px;right:20px;z-index:999;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;display:none;max-width:420px}
  </style>
</head>
<body>

<!-- HEADER -->
<div id="header" style="background:#1e3a5f;padding:20px 28px 0;color:#fff">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
    <div>
      <div style="font-size:20px;font-weight:800;letter-spacing:-.02em">RH Movimentações</div>
      <div id="header-sub" style="font-size:12px;color:#93c5fd;margin-top:2px">Nenhuma base carregada — faça o primeiro upload</div>
    </div>
    <div id="header-counts" style="display:flex;gap:16px;text-align:center"></div>
  </div>
  <div style="display:flex;gap:4px;flex-wrap:wrap" id="tabs">
    <button class="tab-btn" data-tab="dashboard" onclick="showTab('dashboard')">📊 Dashboard</button>
    <button class="tab-btn" data-tab="colaboradores" onclick="showTab('colaboradores')">👥 Colaboradores</button>
    <button class="tab-btn" data-tab="movimentacoes" onclick="showTab('movimentacoes')">🔄 Movimentações</button>
    <button class="tab-btn" data-tab="historico" onclick="showTab('historico')">📅 Histórico</button>
    <button class="tab-btn" data-tab="upload" onclick="showTab('upload')">⬆️ Novo Upload</button>
    <button class="tab-btn" data-tab="erros" id="tab-erros-btn">⚠️ Logs</button>
  </div>
</div>

<style>
.tab-btn{padding:8px 14px;border:none;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;cursor:pointer;transition:all .1s;background:transparent;color:#93c5fd}
.tab-btn.active{background:#fff;color:#1e3a5f}
</style>

<div id="content" style="padding:28px"></div>
<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
var state = { base: null, hist: [], logs: [], diff: null, diffPeriodo: '', currentTab: 'dashboard', page: 0, busca: '', filtroStatus: 'Todos', filtroArea: 'Todas' };

// ── Storage ────────────────────────────────────────────────────────────────
var ST = {
  get: function(k){ var v=localStorage.getItem('rh2_'+k); return v?JSON.parse(v):null; },
  set: function(k,v){ localStorage.setItem('rh2_'+k,JSON.stringify(v)); }
};

// ── Helpers ────────────────────────────────────────────────────────────────
function parseDate(v){
  if(!v) return null;
  if(typeof v==='number'){ var d=new Date(Math.round((v-25569)*86400*1000)); return isNaN(d)?null:d.toISOString().slice(0,10); }
  var s=String(v).trim();
  var m=s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if(m) return m[3]+'-'+m[2]+'-'+m[1];
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  return null;
}
function fmtDate(iso){ if(!iso) return '—'; var p=iso.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function now(){ return new Date().toISOString(); }
function periodoAtual(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }

function showToast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.style.display='block';
  t.style.background=type==='error'?'#fef2f2':'#f0fdf4';
  t.style.border='1px solid '+(type==='error'?'#fca5a5':'#86efac');
  t.style.color=type==='error'?'#991b1b':'#166534';
  setTimeout(function(){ t.style.display='none'; },4000);
}

// ── Parse planilha ─────────────────────────────────────────────────────────
function parsePlanilha(wb){
  var ws=wb.Sheets[wb.SheetNames[0]];
  var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  var headerIdx=rows.findIndex(function(r){ return r.some(function(c){ return String(c).trim()==='Nome completo'; }); });
  if(headerIdx===-1) throw new Error("Cabeçalho 'Nome completo' não encontrado.");
  var headers=rows[headerIdx].map(function(h){ return String(h).trim(); });
  function col(n){ return headers.indexOf(n); }
  var iN=col('Nome completo'),iE=col('Email'),iC=col('Cargo'),iA=col('Área'),iNv=col('Nível');
  var iAd=col('Data de admissão'),iSt=col('Status'),iMo=col('Motivo do Status');
  var iIn=col('Data de Inativação'),iGE=col('E-mails dos gestores'),iGN=col('Nome dos gestores');
  var colaboradores=[],erros=[],emails=new Set();
  for(var i=headerIdx+1;i<rows.length;i++){
    var r=rows[i];
    var nome=String(r[iN]||'').trim(), email=String(r[iE]||'').trim().toLowerCase();
    if(!nome||!email) continue;
    if(emails.has(email)){ erros.push({linha:i+1,email:email,motivo:'Email duplicado'}); continue; }
    emails.add(email);
    var status=String(r[iSt]||'').trim();
    colaboradores.push({
      id:email,nome:nome,email:email,
      cargo:String(r[iC]||'').trim()||null,
      area:String(r[iA]||'').trim()||null,
      nivel:String(r[iNv]||'').trim()||null,
      admissao:parseDate(r[iAd]),
      status:status||'Ativo',
      motivo:String(r[iMo]||'').trim()||null,
      inativacao:parseDate(r[iIn]),
      gestorNome:String(r[iGN]||'').trim()||null
    });
  }
  return {colaboradores:colaboradores,erros:erros};
}

function calcDiff(ant,novo){
  var mapA={};
  (ant||[]).forEach(function(c){ mapA[c.id]=c; });
  var admissoes=[],desligamentos=[],alteracoes=[];
  novo.forEach(function(c){
    if(!mapA[c.id]){ admissoes.push(c); return; }
    var a=mapA[c.id];
    if(a.status!==c.status&&c.status==='Inativo'){ desligamentos.push(Object.assign({},c,{statusAnterior:a.status})); return; }
    if(a.status==='Inativo'&&c.status==='Ativo'){ admissoes.push(Object.assign({},c,{reativacao:true})); return; }
    var changed=[];
    ['cargo','area','nivel','gestorNome'].forEach(function(k){ if(a[k]!==c[k]) changed.push({campo:k,de:a[k],para:c[k]}); });
    if(changed.length) alteracoes.push(Object.assign({},c,{mudancas:changed}));
  });
  return {admissoes:admissoes,desligamentos:desligamentos,alteracoes:alteracoes};
}

// ── Upload handler ─────────────────────────────────────────────────────────
function handleFile(file){
  if(!file) return;
  if(!file.name.match(/\.xlsx?$/i)){ alert('Por favor, envie um arquivo .xlsx'); return; }
  document.getElementById('upload-status').textContent='⏳ Processando...';
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:false});
      var parsed=parsePlanilha(wb);
      var colab=parsed.colaboradores, erros=parsed.erros;
      if(!colab.length) throw new Error('Nenhum colaborador encontrado.');
      var ativos=colab.filter(function(c){ return c.status==='Ativo'; }).length;
      var periodo=periodoAtual();
      var d=state.base?calcDiff(state.base.colaboradores,colab):{admissoes:[],desligamentos:[],alteracoes:[]};
      state.diff=d; state.diffPeriodo=periodo;
      var novaBase={colaboradores:colab,uploadedAt:now(),totalAtivos:ativos,totalInativos:colab.length-ativos,arquivo:file.name};
      var snap={periodo:periodo,uploadedAt:now(),arquivo:file.name,admissoes:d.admissoes.length,desligamentos:d.desligamentos.length,alteracoes:d.alteracoes.length,totalAtivos:ativos};
      state.hist=[snap].concat(state.hist.filter(function(h){ return h.periodo!==periodo; })).slice(0,24);
      state.logs=erros.map(function(e){ return Object.assign({},e,{uploadedAt:now()}); }).concat(state.logs).slice(0,100);
      state.base=novaBase;
      ST.set('base',novaBase); ST.set('hist',state.hist); ST.set('logs',state.logs);
      updateHeader();
      showToast('✅ '+colab.length+' colaboradores processados — '+d.admissoes.length+' admissões, '+d.desligamentos.length+' desligamentos');
      showTab('movimentacoes');
    } catch(err){
      showToast('❌ Erro: '+err.message,'error');
      document.getElementById('upload-status').textContent='';
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── Header ─────────────────────────────────────────────────────────────────
function updateHeader(){
  var b=state.base;
  if(b){
    document.getElementById('header-sub').textContent='Última atualização: '+new Date(b.uploadedAt).toLocaleString('pt-BR')+' — '+b.arquivo;
    document.getElementById('header-counts').innerHTML='<div><div style="font-size:22px;font-weight:700">'+b.totalAtivos+'</div><div style="font-size:11px;color:#93c5fd">Ativos</div></div><div><div style="font-size:22px;font-weight:700">'+b.totalInativos+'</div><div style="font-size:11px;color:#93c5fd">Inativos</div></div>';
  }
  if(state.logs.length) document.getElementById('tab-erros-btn').textContent='⚠️ Logs ('+state.logs.length+')';
}

// ── Tab rendering ──────────────────────────────────────────────────────────
function showTab(tab){
  state.currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active',b.dataset.tab===tab); });
  document.getElementById('tab-erros-btn').dataset.tab='erros';
  document.getElementById('tab-erros-btn').onclick=function(){ showTab('erros'); };
  var c=document.getElementById('content');
  if(tab==='dashboard') c.innerHTML=renderDashboard();
  else if(tab==='colaboradores') c.innerHTML=renderColaboradores();
  else if(tab==='movimentacoes') c.innerHTML=renderMovimentacoes();
  else if(tab==='historico') c.innerHTML=renderHistorico();
  else if(tab==='upload') c.innerHTML=renderUpload();
  else if(tab==='erros') c.innerHTML=renderErros();
  attachEvents(tab);
}

// ── Dashboard ──────────────────────────────────────────────────────────────
function renderDashboard(){
  if(!state.base) return '<div style="text-align:center;padding:60px 0"><div style="font-size:48px;margin-bottom:16px">📂</div><div style="font-size:18px;font-weight:600;color:#374151;margin-bottom:8px">Nenhuma base carregada</div><div style="color:#9ca3af;margin-bottom:24px">Faça o upload da planilha do ImpulseUP para começar</div><button class="btn btn-primary" onclick="showTab(\'upload\')">Fazer primeiro upload →</button></div>';
  var b=state.base, colab=b.colaboradores;
  var ativos=colab.filter(function(c){ return c.status==='Ativo'; });
  var adm2026=ativos.filter(function(c){ return c.admissao&&c.admissao.startsWith('2026'); }).length;
  var areaCounts={};
  ativos.forEach(function(c){ if(c.area) areaCounts[c.area]=(areaCounts[c.area]||0)+1; });
  var areas=Object.entries(areaCounts).sort(function(a,b){ return b[1]-a[1]; }).slice(0,10);
  var maxArea=areas.length?areas[0][1]:1;
  var COLORS=['#2563eb','#16a34a','#d97706','#dc2626','#7c3aed','#0891b2','#db2777','#65a30d','#ea580c','#0369a1'];
  var barsHtml=areas.map(function(a,i){
    var pct=Math.round(a[1]/maxArea*100);
    return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><div style="width:110px;font-size:12px;color:#374151;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(a[0])+'</div><div style="flex:1;background:#f3f4f6;border-radius:4px;height:20px"><div style="width:'+pct+'%;background:'+COLORS[i%COLORS.length]+';height:20px;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px"><span style="font-size:11px;color:#fff;font-weight:600">'+a[1]+'</span></div></div></div>';
  }).join('');
  var pctAtivo=Math.round(ativos.length/colab.length*100);
  return '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:28px">'+
    statCard('Total','#2563eb',colab.length,'')+
    statCard('Ativos','#16a34a',ativos.length,pctAtivo+'% do total')+
    statCard('Inativos','#dc2626',colab.length-ativos.length,'')+
    statCard('Admitidos 2026','#7c3aed',adm2026,'')+
    statCard('Períodos','#0891b2',state.hist.length,'no histórico')+
  '</div>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">'+
    '<div class="card"><div style="font-weight:700;font-size:14px;margin-bottom:16px;color:#374151">Colaboradores por área (ativos)</div>'+barsHtml+'</div>'+
    '<div class="card"><div style="font-weight:700;font-size:14px;margin-bottom:16px;color:#374151">Status geral</div>'+
      '<div style="display:flex;flex-direction:column;gap:16px;padding-top:8px">'+
        '<div><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px">Ativos</span><span style="font-size:13px;font-weight:700">'+ativos.length+'</span></div><div style="background:#f3f4f6;border-radius:4px;height:12px"><div style="width:'+pctAtivo+'%;background:#16a34a;height:12px;border-radius:4px"></div></div></div>'+
        '<div><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px">Inativos</span><span style="font-size:13px;font-weight:700">'+(colab.length-ativos.length)+'</span></div><div style="background:#f3f4f6;border-radius:4px;height:12px"><div style="width:'+(100-pctAtivo)+'%;background:#dc2626;height:12px;border-radius:4px"></div></div></div>'+
      '</div>'+
    '</div>'+
  '</div>';
}

function statCard(label,color,value,sub){
  return '<div class="stat-card" style="border-top:3px solid '+color+'"><div style="font-size:12px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">'+label+'</div><div style="font-size:32px;font-weight:700;color:#111827;line-height:1">'+value+'</div>'+(sub?'<div style="font-size:12px;color:#9ca3af;margin-top:4px">'+sub+'</div>':'')+'</div>';
}

// ── Colaboradores ──────────────────────────────────────────────────────────
function renderColaboradores(){
  if(!state.base) return '<div style="text-align:center;color:#9ca3af;padding:60px">Carregue uma planilha primeiro</div>';
  var colab=state.base.colaboradores;
  var q=state.busca.toLowerCase();
  var filtered=colab.filter(function(c){
    var mb=!q||c.nome.toLowerCase().includes(q)||c.email.toLowerCase().includes(q)||(c.cargo||'').toLowerCase().includes(q);
    var ms=state.filtroStatus==='Todos'||c.status===state.filtroStatus;
    var ma=state.filtroArea==='Todas'||c.area===state.filtroArea;
    return mb&&ms&&ma;
  });
  var ps=15, pages=Math.ceil(filtered.length/ps), page=Math.min(state.page,pages-1)||0;
  var slice=filtered.slice(page*ps,(page+1)*ps);
  var areas=['Todas'].concat(Array.from(new Set(colab.map(function(c){ return c.area; }).filter(Boolean))).sort());
  var areasOpts=areas.map(function(a){ return '<option'+(a===state.filtroArea?' selected':'')+'>'+esc(a)+'</option>'; }).join('');
  var rows=slice.map(function(c){
    return '<tr><td><span style="font-weight:500">'+esc(c.nome)+'</span></td><td style="color:#6b7280;font-size:12px">'+esc(c.email)+'</td><td>'+esc(c.cargo||'—')+'</td><td>'+esc(c.area||'—')+'</td><td>'+fmtDate(c.admissao)+'</td><td><span class="badge badge-'+(c.status==='Ativo'?'green':'red')+'">'+c.status+'</span></td><td style="font-size:12px;color:#6b7280">'+esc(c.gestorNome?c.gestorNome.split(',')[0]:'—')+'</td></tr>';
  }).join('');
  if(!slice.length) rows='<tr><td colspan="7" style="text-align:center;color:#9ca3af;padding:32px">Nenhum resultado</td></tr>';
  var pagination='';
  if(pages>1) pagination='<div style="display:flex;justify-content:center;gap:6px;margin-top:16px"><button class="btn" onclick="changePage(-1)" '+(page===0?'disabled':'')+'>← Anterior</button><span style="align-self:center;font-size:13px;color:#6b7280">Página '+(page+1)+' de '+pages+'</span><button class="btn" onclick="changePage(1)" '+(page===pages-1?'disabled':'')+'>Próxima →</button></div>';
  return '<div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap"><input type="search" id="busca-input" placeholder="🔍 Buscar nome, email ou cargo..." value="'+esc(state.busca)+'" style="flex:1;min-width:220px" oninput="updateBusca(this.value)"><select onchange="updateFiltroStatus(this.value)"><option'+(state.filtroStatus==='Todos'?' selected':'')+'>Todos</option><option'+(state.filtroStatus==='Ativo'?' selected':'')+'>Ativo</option><option'+(state.filtroStatus==='Inativo'?' selected':'')+'>Inativo</option></select><select onchange="updateFiltroArea(this.value)" style="max-width:200px">'+areasOpts+'</select><span style="align-self:center;font-size:12px;color:#9ca3af">'+filtered.length+' resultado(s)</span></div><div style="overflow-x:auto;border-radius:12px;border:1px solid #e5e7eb"><table><thead><tr><th>Nome</th><th>Email</th><th>Cargo</th><th>Área</th><th>Admissão</th><th>Status</th><th>Gestor</th></tr></thead><tbody>'+rows+'</tbody></table></div>'+pagination;
}

function updateBusca(v){ state.busca=v; state.page=0; showTab('colaboradores'); }
function updateFiltroStatus(v){ state.filtroStatus=v; state.page=0; showTab('colaboradores'); }
function updateFiltroArea(v){ state.filtroArea=v; state.page=0; showTab('colaboradores'); }
function changePage(d){ state.page+=d; showTab('colaboradores'); }

// ── Movimentações ──────────────────────────────────────────────────────────
function renderMovimentacoes(){
  if(!state.diff) return '<div style="text-align:center;padding:60px"><div style="font-size:36px;margin-bottom:12px">🔄</div><div style="color:#9ca3af">As movimentações aparecerão aqui após o próximo upload</div></div>';
  var d=state.diff, total=d.admissoes.length+d.desligamentos.length+d.alteracoes.length;
  if(!total) return '<div style="padding:24px;background:#f0fdf4;border-radius:12px;border:1px solid #bbf7d0;text-align:center"><div style="font-size:24px;margin-bottom:8px">✅</div><div style="font-weight:600;color:#166534">Nenhuma movimentação detectada</div></div>';
  var html='<div style="font-weight:700;font-size:16px;color:#111827;margin-bottom:20px">Movimentações — '+state.diffPeriodo+' <span style="font-size:13px;font-weight:400;color:#6b7280">'+total+' no total</span></div>';
  function section(title,items,color,fn){
    if(!items.length) return '';
    return '<div style="margin-bottom:24px"><div style="font-weight:700;font-size:14px;color:'+color+';margin-bottom:10px;display:flex;align-items:center;gap:8px">'+title+' <span style="background:'+color+';color:#fff;border-radius:99px;padding:1px 8px;font-size:12px">'+items.length+'</span></div><div style="display:flex;flex-direction:column;gap:8px">'+items.map(fn).join('')+'</div></div>';
  }
  html+=section('🟢 Admissões / reativações',d.admissoes,'#16a34a',function(c){
    return '<div style="padding:10px 14px;background:#fff;border-radius:8px;border:1px solid #e5e7eb;font-size:13px"><span style="font-weight:600">'+esc(c.nome)+'</span> <span style="color:#6b7280">'+esc(c.email)+'</span>'+(c.reativacao?' <span class="badge badge-blue">Reativação</span>':'')+' <span style="float:right;color:#9ca3af">'+esc(c.cargo||'')+(c.area?' · '+c.area:'')+'</span></div>';
  });
  html+=section('🔴 Desligamentos',d.desligamentos,'#dc2626',function(c){
    return '<div style="padding:10px 14px;background:#fff;border-radius:8px;border:1px solid #e5e7eb;font-size:13px"><span style="font-weight:600">'+esc(c.nome)+'</span> <span style="color:#6b7280">'+esc(c.email)+'</span>'+(c.motivo?' <span style="color:#dc2626;font-size:12px">— '+esc(c.motivo)+'</span>':'')+' <span style="float:right;color:#9ca3af">'+fmtDate(c.inativacao)+'</span></div>';
  });
  html+=section('🟡 Alterações cadastrais',d.alteracoes,'#d97706',function(c){
    var mudancas=c.mudancas.map(function(m){ return '<div style="font-size:12px;color:#6b7280;padding-left:12px"><span style="font-weight:500">'+esc(m.campo)+'</span>: <span style="color:#ef4444;text-decoration:line-through">'+esc(m.de||'—')+'</span> → <span style="color:#16a34a">'+esc(m.para||'—')+'</span></div>'; }).join('');
    return '<div style="padding:10px 14px;background:#fff;border-radius:8px;border:1px solid #e5e7eb;font-size:13px;display:flex;flex-direction:column;gap:4px"><div><span style="font-weight:600">'+esc(c.nome)+'</span> <span style="color:#6b7280">'+esc(c.email)+'</span></div>'+mudancas+'</div>';
  });
  return html;
}

// ── Histórico ──────────────────────────────────────────────────────────────
function renderHistorico(){
  if(!state.hist.length) return '<div style="text-align:center;color:#9ca3af;padding:32px">Nenhum histórico ainda</div>';
  var sorted=[].concat(state.hist).sort(function(a,b){ return b.periodo.localeCompare(a.periodo); });
  var cards=sorted.map(function(h){
    return '<div class="card" style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-weight:700;color:#111827">'+h.periodo.slice(5)+'/'+h.periodo.slice(0,4)+'</span><span style="font-size:12px;color:#9ca3af">'+new Date(h.uploadedAt).toLocaleDateString('pt-BR')+'</span></div><div style="display:flex;gap:10px;flex-wrap:wrap"><span class="badge badge-green">+'+h.admissoes+' admissões</span><span class="badge badge-red">-'+h.desligamentos+' desligamentos</span><span class="badge badge-amber">'+h.alteracoes+' alterações</span><span class="badge badge-blue">'+h.totalAtivos+' ativos</span></div></div>';
  }).join('');
  return cards;
}

// ── Upload ─────────────────────────────────────────────────────────────────
function renderUpload(){
  return '<div style="max-width:560px;margin:0 auto"><div style="font-weight:700;font-size:18px;color:#111827;margin-bottom:6px">Novo upload mensal</div><div style="font-size:13px;color:#6b7280;margin-bottom:24px">Exporte a planilha atualizada do ImpulseUP e faça o upload abaixo.</div><div id="drop-zone" style="border:2px dashed #d1d5db;border-radius:16px;padding:40px 24px;text-align:center;cursor:pointer;background:#fafafa" onclick="document.getElementById(\'file-input\').click()" ondragover="event.preventDefault();this.style.borderColor=\'#2563eb\';this.style.background=\'#eff6ff\'" ondragleave="this.style.borderColor=\'#d1d5db\';this.style.background=\'#fafafa\'" ondrop="event.preventDefault();this.style.borderColor=\'#d1d5db\';this.style.background=\'#fafafa\';handleFile(event.dataTransfer.files[0])"><input type="file" id="file-input" accept=".xlsx,.xls" style="display:none" onchange="handleFile(this.files[0])"><div style="font-size:40px;margin-bottom:12px">📊</div><div style="font-weight:600;color:#111827;margin-bottom:4px">Arraste o arquivo .xlsx aqui</div><div style="font-size:13px;color:#9ca3af">ou clique para selecionar — exportação do ImpulseUP</div></div><div id="upload-status" style="margin-top:12px;font-size:13px;color:#2563eb;text-align:center"></div><div style="margin-top:20px;padding:16px;background:#fffbeb;border-radius:10px;border:1px solid #fde68a;font-size:13px;color:#92400e"><strong>📋 Como exportar do ImpulseUP:</strong><br>Configurações → Usuários → Exportar usuários → Baixar .xlsx</div></div>';
}

// ── Erros ──────────────────────────────────────────────────────────────────
function renderErros(){
  if(!state.logs.length) return '<div style="text-align:center;color:#9ca3af;padding:40px">✅ Nenhum erro registrado</div>';
  var rows=state.logs.map(function(l){ return '<tr><td>'+(l.linha||'—')+'</td><td style="color:#6b7280;font-size:12px">'+esc(l.email)+'</td><td><span class="badge badge-amber">'+esc(l.motivo)+'</span></td><td style="font-size:12px;color:#9ca3af">'+new Date(l.uploadedAt).toLocaleString('pt-BR')+'</td></tr>'; }).join('');
  return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div style="font-weight:700;font-size:16px">Log de erros</div><button class="btn" onclick="clearLogs()">Limpar</button></div><div style="overflow-x:auto;border-radius:12px;border:1px solid #e5e7eb"><table><thead><tr><th>Linha</th><th>Email</th><th>Motivo</th><th>Data</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function clearLogs(){ state.logs=[]; ST.set('logs',[]); showTab('erros'); }
function attachEvents(tab){}

// ── Init ──────────────────────────────────────────────────────────────────
(function init(){
  var b=ST.get('base'), h=ST.get('hist'), l=ST.get('logs');
  if(b) state.base=b;
  if(h) state.hist=h;
  if(l) state.logs=l;
  updateHeader();
  showTab('dashboard');
  document.querySelector('[data-tab="dashboard"]').classList.add('active');
})();
</script>
</body>
</html>
